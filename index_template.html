<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card-bg: #12121a;
      --card-border: #1e1e2e;
      --neon-cyan: #00f5ff;
      --neon-magenta: #ff00aa;
      --neon-yellow: #ffe600;
      --neon-orange: #ff6b00;
      --text: #e0e0e0;
      --text-dim: #888;
      --model-claude: #00d4ff;
      --model-gpt: #7fff00;
      --model-gemini: #ff00aa;
      --model-deepseek: #00ff88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    header p {
      color: var(--text-dim);
      font-size: 1.05rem;
      max-width: 600px;
      margin: 0 auto 24px;
    }

    header .cta-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    header .cta-row a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    header .cta-row a:hover { opacity: 0.8; }
    .btn-youtube { background: #ff0000; color: #fff; }
    .btn-subscribe { background: #ff0000; color: #fff; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: var(--neon-cyan);
      transform: translateY(-2px);
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .card-prompt {
      padding: 12px 20px;
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
      border-bottom: 1px solid var(--card-border);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .model-links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
    }

    .model-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      border-right: 1px solid var(--card-border);
      border-top: 1px solid var(--card-border);
      transition: filter 0.2s, background 0.2s;
    }

    .model-links a:nth-child(even) { border-right: none; }

    .model-links a:hover { filter: brightness(1.3); }

    .model-claude { color: var(--model-claude); }
    .model-gpt { color: var(--model-gpt); }
    .model-gemini { color: var(--model-gemini); }
    .model-deepseek { color: var(--model-deepseek); }

    footer {
      text-align: center;
      margin-top: 60px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    footer a { color: var(--neon-cyan); text-decoration: none; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <p>{{DESCRIPTION}}</p>
    <div class="cta-row">
      <a class="btn-youtube" href="https://youtube.com/@CodeColosseum999">▶ Watch on YouTube</a>
      <a class="btn-subscribe" href="https://youtube.com/@CodeColosseum999?sub_confirmation=1">☁ Subscribe</a>
    </div>
  </header>

  <main class="grid">
{{CARDS}}
  </main>

  <footer>
    <p>Generated by <a href="https://github.com/codecolosseum999/CodeColosseum-Demos">CodeColosseum</a> · <a href="https://youtube.com/@CodeColosseum999">YouTube Channel</a></p>
  </footer>
</body>
</html>
