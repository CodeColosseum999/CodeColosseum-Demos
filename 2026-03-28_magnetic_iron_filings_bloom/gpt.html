<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Iron Filings</title>
    <style>
        html, body {
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
    'use strict';

    function clamp(value, min, max) {
        if (value < min) {
            return min;
        }
        if (value > max) {
            return max;
        }
        return value;
    }

    function readNumber(params, key, fallback, min, max) {
        let raw = params.get(key);
        let value = fallback;
        if (raw !== null) {
            let parsed = Number(raw);
            if (Number.isFinite(parsed)) {
                value = parsed;
            }
        }
        return clamp(value, min, max);
    }

    function wrapAngle(angle) {
        let tau = Math.PI * 2;
        while (angle > Math.PI) {
            angle -= tau;
        }
        while (angle < -Math.PI) {
            angle += tau;
        }
        return angle;
    }

    function mulberry32(seed) {
        let state = seed >>> 0;
        return function () {
            state = (state + 0x6D2B79F5) >>> 0;
            let t = state;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
    }

    let params = new URLSearchParams(window.location.search);
    let w = Math.floor(readNumber(params, 'w', 416, 128, 1600));
    let h = Math.floor(readNumber(params, 'h', 416, 128, 1600));
    let loop = Math.floor(readNumber(params, 'loop', 10000, 4000, 30000));
    let phase = readNumber(params, 'phase', 0, -1000000000, 1000000000);
    let t0 = readNumber(params, 't0', Date.now(), 0, 9007199254740991);
    let speed = readNumber(params, 'speed', 1, 0.05, 4);
    let seed = Math.floor(readNumber(params, 'seed', 1337, 1, 2147483647));
    let density = readNumber(params, 'density', 1, 0.5, 2);

    let rawDpr = window.devicePixelRatio;
    let dpr = clamp(rawDpr === undefined || rawDpr === null ? 1 : rawDpr, 1, 2);

    let canvas = document.getElementById('c');
    let ctx = canvas.getContext('2d');

    document.body.style.width = w + 'px';
    document.body.style.height = h + 'px';

    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.scale(dpr, dpr);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let tau = Math.PI * 2;
    let minDim = Math.min(w, h);
    let count = Math.floor(clamp((w * h / 34) * density, 2600, 8200));
    let dustCount = Math.floor(clamp(count * 0.17, 400, 1800));

    let filings = [];
    let dust = [];
    let currentLoop = 0;
    let lastStamp = Date.now();

    let magnet = {
        cx: 0,
        cy: 0,
        theta: 0,
        northX: 0,
        northY: 0,
        southX: 0,
        southY: 0,
        glowX: 0,
        glowY: 0
    };

    let fieldX = 0;
    let fieldY = 0;
    let fieldMag = 0;

    function updateMagnet(progress) {
        let a = tau * progress;

        let cx = w * 0.5
            + Math.sin(a) * w * 0.2
            + Math.sin(a * 2 + 0.8) * w * 0.065
            + Math.cos(a * 3 - 0.9) * w * 0.04;

        let cy = h * 0.5
            + Math.cos(a + 0.35) * h * 0.18
            + Math.sin(a * 2 - 0.7) * h * 0.07
            + Math.sin(a * 3 + 1.4) * h * 0.035;

        let dx = Math.cos(a) * w * 0.2
            + Math.cos(a * 2 + 0.8) * w * 0.13
            - Math.sin(a * 3 - 0.9) * w * 0.12;

        let dy = -Math.sin(a + 0.35) * h * 0.18
            + Math.cos(a * 2 - 0.7) * h * 0.14
            + Math.cos(a * 3 + 1.4) * h * 0.105;

        let theta = Math.atan2(dy, dx) + Math.sin(a * 2.5) * 0.55;
        let sep = minDim * 0.12;
        let ox = Math.cos(theta) * sep * 0.5;
        let oy = Math.sin(theta) * sep * 0.5;

        magnet.cx = cx;
        magnet.cy = cy;
        magnet.theta = theta;
        magnet.northX = cx + ox;
        magnet.northY = cy + oy;
        magnet.southX = cx - ox;
        magnet.southY = cy - oy;
        magnet.glowX = cx + Math.cos(theta + Math.PI * 0.5) * sep * 0.2;
        magnet.glowY = cy + Math.sin(theta + Math.PI * 0.5) * sep * 0.2;
    }

    function sampleField(x, y) {
        let soft = minDim * minDim * 0.0014;

        let dx1 = x - magnet.northX;
        let dy1 = y - magnet.northY;
        let d1 = dx1 * dx1 + dy1 * dy1 + soft;
        let i1 = 1 / (d1 * Math.sqrt(d1));

        let dx2 = x - magnet.southX;
        let dy2 = y - magnet.southY;
        let d2 = dx2 * dx2 + dy2 * dy2 + soft;
        let i2 = 1 / (d2 * Math.sqrt(d2));

        fieldX = dx1 * i1 - dx2 * i2;
        fieldY = dy1 * i1 - dy2 * i2;
        fieldMag = Math.sqrt(fieldX * fieldX + fieldY * fieldY);
    }

    function simulate(dtSim, progress) {
        updateMagnet(progress);

        let timeWarp = progress * tau;
        let i = 0;

        for (i = 0; i < filings.length; i += 1) {
            let p = filings[i];

            sampleField(p.x, p.y);

            let inv = 1 / (fieldMag + 0.0000001);
            let ux = fieldX * inv;
            let uy = fieldY * inv;
            let px = -uy;
            let py = ux;

            let targetAngle = Math.atan2(fieldY, fieldX);
            let fieldGlow = clamp(Math.sqrt(fieldMag) * minDim * 0.22, 0, 1);
            let band = Math.sin(p.band + p.hx * 0.021 - p.hy * 0.018 + timeWarp * 2.0);
            let micro = Math.sin(p.sway + timeWarp * (1.3 + p.mobility * 0.45));

            let chainTarget = clamp(fieldGlow * (0.72 + 0.4 * (0.5 + 0.5 * band)), 0, 1);
            let lag = clamp(dtSim * (0.11 + 0.1 * p.mobility), 0, 1);
            let angleLag = clamp(dtSim * (0.21 + 0.16 * p.mobility), 0, 1);
            let chainLag = clamp(dtSim * (0.055 + 0.05 * p.mobility), 0, 1);

            let targetX = p.hx + ux * (0.35 + p.chain * 1.9) + px * band * p.chain * 0.5;
            let targetY = p.hy + uy * (0.35 + p.chain * 1.9) + py * band * p.chain * 0.5;

            p.chain += (chainTarget - p.chain) * chainLag;
            p.brightness += (fieldGlow - p.brightness) * chainLag;
            p.angle += wrapAngle(targetAngle - p.angle) * angleLag;

            p.vx += (targetX - p.x) * lag;
            p.vy += (targetY - p.y) * lag;
            p.vx += ux * micro * p.chain * 0.018 * dtSim * p.polarity;
            p.vy += uy * micro * p.chain * 0.018 * dtSim * p.polarity;
            p.vx *= 0.82;
            p.vy *= 0.82;
            p.x += p.vx;
            p.y += p.vy;

            let shimmer = 0.72 + 0.28 * Math.sin(p.sway + timeWarp * (0.8 + p.grit));
            p.dirX = Math.cos(p.angle);
            p.dirY = Math.sin(p.angle);
            p.renderLen = p.length * (0.75 + p.chain * 2.2) * shimmer;
            p.level = p.chain + p.brightness * 0.55;
        }
    }

    function resetSimulation(progress) {
        let rand = mulberry32(seed);

        let cols = Math.max(8, Math.floor(Math.sqrt(count * w / h)));
        let rows = Math.max(8, Math.floor(count / cols));
        let stepX = w / cols;
        let stepY = h / rows;

        filings.length = 0;
        updateMagnet(0);

        let ry = 0;
        let rx = 0;
        for (ry = 0; ry < rows; ry += 1) {
            for (rx = 0; rx < cols; rx += 1) {
                let hx = (rx + 0.5) * stepX + (rand() - 0.5) * stepX * 0.92;
                let hy = (ry + 0.5) * stepY + (rand() - 0.5) * stepY * 0.92;

                hx = clamp(hx, -8, w + 8);
                hy = clamp(hy, -8, h + 8);

                sampleField(hx, hy);

                let angle = Math.atan2(fieldY, fieldX);
                let brightness = clamp(Math.sqrt(fieldMag) * minDim * 0.16, 0, 1);
                let length = 0.65 + rand() * 2.05;

                filings.push({
                    hx: hx,
                    hy: hy,
                    x: hx,
                    y: hy,
                    vx: 0,
                    vy: 0,
                    angle: angle,
                    chain: brightness,
                    brightness: brightness,
                    length: length,
                    mobility: 0.6 + rand() * 0.8,
                    sway: rand() * tau,
                    band: rand() * tau,
                    grit: rand(),
                    polarity: rand() < 0.5 ? -1 : 1,
                    dirX: Math.cos(angle),
                    dirY: Math.sin(angle),
                    renderLen: length,
                    level: brightness
                });
            }
        }

        dust.length = 0;
        let i = 0;
        for (i = 0; i < dustCount; i += 1) {
            dust.push({
                x: rand() * w,
                y: rand() * h,
                phase: rand() * tau,
                drift: 0.25 + rand() * 1.35,
                alpha: 0.08 + rand() * 0.24,
                size: 0.25 + rand() * 0.85
            });
        }

        let warmup = Math.floor(progress * loop / 16.6666667);
        warmup = clamp(warmup, 0, 720);

        if (warmup > 0) {
            for (i = 0; i < warmup; i += 1) {
                let stepProgress = ((i + 1) / warmup) * progress;
                simulate(1, stepProgress);
            }
        }
    }

    function drawBackdrop(progress) {
        let centerGlow = ctx.createRadialGradient(
            w * 0.5,
            h * 0.52,
            minDim * 0.08,
            w * 0.5,
            h * 0.52,
            minDim * 0.72
        );
        centerGlow.addColorStop(0, 'rgba(8,14,22,0.2)');
        centerGlow.addColorStop(0.45, 'rgba(5,10,14,0.12)');
        centerGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = centerGlow;
        ctx.fillRect(0, 0, w, h);

        let driftGlow = ctx.createRadialGradient(
            magnet.glowX,
            magnet.glowY,
            0,
            magnet.glowX,
            magnet.glowY,
            minDim * 0.88
        );
        driftGlow.addColorStop(0, 'rgba(0,92,116,0.035)');
        driftGlow.addColorStop(0.45, 'rgba(0,34,44,0.02)');
        driftGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = driftGlow;
        ctx.fillRect(0, 0, w, h);

        let edgeWash = ctx.createLinearGradient(0, 0, w, h);
        edgeWash.addColorStop(0, 'rgba(0,0,0,0.1)');
        edgeWash.addColorStop(0.5, 'rgba(0,10,16,0.02)');
        edgeWash.addColorStop(1, 'rgba(0,0,0,0.1)');
        ctx.fillStyle = edgeWash;
        ctx.fillRect(0, 0, w, h);
    }

    function drawFilings() {
        let i = 0;
        let p;
        let dx;
        let dy;

        ctx.globalCompositeOperation = 'source-over';

        ctx.strokeStyle = 'rgba(34,38,42,0.22)';
        ctx.lineWidth = 0.55;
        ctx.beginPath();
        for (i = 0; i < filings.length; i += 1) {
            p = filings[i];
            if (p.level >= 0.34) {
                continue;
            }
            dx = p.dirX * p.renderLen;
            dy = p.dirY * p.renderLen;
            ctx.moveTo(p.x - dx, p.y - dy);
            ctx.lineTo(p.x + dx, p.y + dy);
        }
        ctx.stroke();

        ctx.strokeStyle = 'rgba(112,118,126,0.18)';
        ctx.lineWidth = 0.72;
        ctx.beginPath();
        for (i = 0; i < filings.length; i += 1) {
            p = filings[i];
            if (p.level < 0.34 || p.level >= 0.75) {
                continue;
            }
            dx = p.dirX * p.renderLen;
            dy = p.dirY * p.renderLen;
            ctx.moveTo(p.x - dx, p.y - dy);
            ctx.lineTo(p.x + dx, p.y + dy);
        }
        ctx.stroke();

        ctx.strokeStyle = 'rgba(216,222,228,0.16)';
        ctx.lineWidth = 0.95;
        ctx.beginPath();
        for (i = 0; i < filings.length; i += 1) {
            p = filings[i];
            if (p.level < 0.75) {
                continue;
            }
            dx = p.dirX * p.renderLen;
            dy = p.dirY * p.renderLen;
            ctx.moveTo(p.x - dx, p.y - dy);
            ctx.lineTo(p.x + dx, p.y + dy);
        }
        ctx.stroke();

        ctx.globalCompositeOperation = 'lighter';

        ctx.strokeStyle = 'rgba(76,206,226,0.04)';
        ctx.lineWidth = 0.78;
        ctx.beginPath();
        for (i = 0; i < filings.length; i += 1) {
            p = filings[i];
            if (p.level < 0.34 || p.level >= 0.75) {
                continue;
            }
            dx = p.dirX * p.renderLen * 0.56;
            dy = p.dirY * p.renderLen * 0.56;
            ctx.moveTo(p.x - dx, p.y - dy);
            ctx.lineTo(p.x + dx, p.y + dy);
        }
        ctx.stroke();

        ctx.strokeStyle = 'rgba(154,246,255,0.052)';
        ctx.lineWidth = 1.12;
        ctx.beginPath();
        for (i = 0; i < filings.length; i += 1) {
            p = filings[i];
            if (p.level < 0.75) {
                continue;
            }
            dx = p.dirX * p.renderLen * 0.72;
            dy = p.dirY * p.renderLen * 0.72;
            ctx.moveTo(p.x - dx, p.y - dy);
            ctx.lineTo(p.x + dx, p.y + dy);
        }
        ctx.stroke();

        ctx.fillStyle = 'rgba(214,250,255,0.055)';
        for (i = 0; i < filings.length; i += 1) {
            p = filings[i];
            if (p.level < 0.82 || p.grit < 0.84) {
                continue;
            }
            dx = p.dirX * p.renderLen * 0.9;
            dy = p.dirY * p.renderLen * 0.9;
            let size = 0.35 + p.chain * 0.85;
            ctx.fillRect(p.x + dx, p.y + dy, size, size);
        }
    }

    function drawDust(progress) {
        let i = 0;
        ctx.globalCompositeOperation = 'lighter';

        for (i = 0; i < dust.length; i += 1) {
            let p = dust[i];
            let dx = magnet.glowX - p.x;
            let dy = magnet.glowY - p.y;
            let ds = dx * dx + dy * dy;
            let influence = 1 / (1 + ds / (minDim * minDim * 0.09));
            let pulse = 0.5 + 0.5 * Math.sin(p.phase + progress * tau * p.drift);
            let alpha = p.alpha * influence * pulse * 0.7;

            if (alpha < 0.01) {
                continue;
            }

            ctx.fillStyle = 'rgba(150,235,255,' + alpha.toFixed(4) + ')';
            ctx.fillRect(
                p.x + Math.sin(p.phase + progress * tau) * 0.38,
                p.y + Math.cos(p.phase - progress * tau * 1.15) * 0.38,
                p.size,
                p.size
            );
        }
    }

    function frame() {
        let stamp = Date.now();
        let progress = ((stamp - t0 + phase) % loop) / loop;
        if (progress < 0) {
            progress += 1;
        }

        let loopIndex = Math.floor((stamp - t0 + phase) / loop);
        if (loopIndex !== currentLoop) {
            currentLoop = loopIndex;
            resetSimulation(progress);
            lastStamp = stamp;
        }

        let dt = clamp((stamp - lastStamp) / 16.6666667, 0.25, 2.5);
        let dtSim = dt * speed;
        lastStamp = stamp;

        simulate(dtSim, progress);

        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, w, h);

        drawBackdrop(progress);
        drawFilings();
        drawDust(progress);

        requestAnimationFrame(frame);
    }

    let startStamp = Date.now();
    let startProgress = ((startStamp - t0 + phase) % loop) / loop;
    if (startProgress < 0) {
        startProgress += 1;
    }

    currentLoop = Math.floor((startStamp - t0 + phase) / loop);
    resetSimulation(startProgress);
    lastStamp = startStamp;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    requestAnimationFrame(frame);
}());
</script>
