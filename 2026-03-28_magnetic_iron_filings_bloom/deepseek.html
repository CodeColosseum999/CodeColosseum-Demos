<!DOCTYPE html>                                                                                                                                              
<html lang="en">                                                                                                                                             
<head>                                                                                                                                                       
<meta charset="UTF-8">                                                                                                                                       
<meta name="viewport" content="width=device-width, initial-scale=1.0">                                                                                       
<title>Magnetic Iron Filings Bloom</title>                                                                                                                   
<style>                                                                                                                                                      
html, body {                                                                                                                                                 
  margin: 0;                                                                                                                                                 
  background: #000;                                                                                                                                          
  overflow: hidden;                                                                                                                                          
}                                                                                                                                                            
canvas {                                                                                                                                                     
  display: block;                                                                                                                                            
}                                                                                                                                                            
</style>                                                                                                                                                     
</head>                                                                                                                                                      
<body>                                                                                                                                                       
<canvas id="canvas"></canvas>                                                                                                                                
<script>                                                                                                                                                     
(function() {                                                                                                                                                
  // ----- URL parameter parsing (explicit checks, no || 0) -----                                                                                            
  let params = new URLSearchParams(window.location.search);                                                                                                  
  function getParamInt(name, defaultValue) {                                                                                                                 
    if (params.has(name)) {                                                                                                                                  
      let val = params.get(name);                                                                                                                            
      let num = parseInt(val, 10);                                                                                                                           
      if (!isNaN(num)) return num;                                                                                                                           
    }                                                                                                                                                        
    return defaultValue;                                                                                                                                     
  }                                                                                                                                                          
  let w = getParamInt('w', 416);                                                                                                                             
  let h = getParamInt('h', w);                                                                                                                               
  w = Math.max(100, Math.min(w, 2048));                                                                                                                      
  h = Math.max(100, Math.min(h, 2048));                                                                                                                      
  let t0 = 0;                                                                                                                                                
  if (params.has('t0')) {                                                                                                                                    
    let val = params.get('t0');                                                                                                                              
    t0 = parseInt(val, 10);                                                                                                                                  
    if (isNaN(t0)) t0 = 0;                                                                                                                                   
  }                                                                                                                                                          
  let phase = 0;                                                                                                                                             
  if (params.has('phase')) {                                                                                                                                 
    let val = params.get('phase');                                                                                                                           
    phase = parseInt(val, 10);                                                                                                                               
    if (isNaN(phase)) phase = 0;                                                                                                                             
  }                                                                                                                                                          
  let speed = getParamInt('speed', 1);                                                                                                                       
  speed = Math.max(0, Math.min(speed, 10));                                                                                                                  
  let seed = getParamInt('seed', 1);                                                                                                                         
  let loopMs = getParamInt('loop', 10000);                                                                                                                   
  loopMs = Math.max(1000, Math.min(loopMs, 60000));                                                                                                          
                                                                                                                                                             
  // ----- Seeded PRNG (Mulberry32) -----                                                                                                                    
  function SeededRandom(seed) {                                                                                                                              
    let state = seed;                                                                                                                                        
    return function() {                                                                                                                                      
      state |= 0;                                                                                                                                            
      state = (state + 0x6D2B79F5) | 0;                                                                                                                      
      let t = Math.imul(state ^ (state >>> 15), state | 1);                                                                                                  
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);                                                                                                             
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;                                                                                                          
    };                                                                                                                                                       
  }                                                                                                                                                          
                                                                                                                                                             
  // ----- Canvas setup with DPR scaling -----                                                                                                               
  let canvas = document.getElementById('canvas');                                                                                                            
  if (!canvas) throw new Error('Canvas element not found');                                                                                                  
  let ctx = canvas.getContext('2d');                                                                                                                         
  if (!ctx) throw new Error('Canvas 2d context not supported');                                                                                              
  let dpr = window.devicePixelRatio || 1;                                                                                                                    
  canvas.style.width = w + 'px';                                                                                                                             
  canvas.style.height = h + 'px';                                                                                                                            
  canvas.width = Math.floor(w * dpr);                                                                                                                        
  canvas.height = Math.floor(h * dpr);                                                                                                                       
  ctx.scale(dpr, dpr);                                                                                                                                       
                                                                                                                                                             
  // ----- Simulation constants -----                                                                                                                        
  let numParticles = 2000;                                                                                                                                   
  let angularSpeed = 5.0;       // rad/s                                                                                                                     
  let driftSpeed = 0.1;         // px per unit field per second                                                                                              
  let segmentLength = 5;        // filing visual length                                                                                                      
                                                                                                                                                             
  // ----- Mutable simulation state -----                                                                                                                    
  let lastTime = Date.now();                                                                                                                                 
  let currentLoopIndex = -1;                                                                                                                                 
  let particles = [];                                                                                                                                        
  let magnetX = w / 2;                                                                                                                                       
  let magnetY = h / 2;                                                                                                                                       
  let random = SeededRandom(seed);  // base random generator, will be re‑created each loop                                                                   
                                                                                                                                                             
  // ----- Re‑seed and generate particles -----                                                                                                              
  function reseedSimulation() {                                                                                                                              
    random = SeededRandom(seed);   // deterministic seed for this loop                                                                                       
    particles = [];                                                                                                                                          
    for (let i = 0; i < numParticles; i++) {                                                                                                                 
      let x = random() * w;                                                                                                                                  
      let y = random() * h;                                                                                                                                  
      let angle = random() * Math.PI * 2;                                                                                                                    
      particles.push({ x, y, angle });                                                                                                                       
    }                                                                                                                                                        
  }                                                                                                                                                          
                                                                                                                                                             
  // ----- Magnetic dipole field (unit moment = (0, 1) vertical) -----                                                                                       
  function fieldAt(x, y) {                                                                                                                                   
    let dx = x - magnetX;                                                                                                                                    
    let dy = y - magnetY;                                                                                                                                    
    let r2 = dx * dx + dy * dy;                                                                                                                              
    if (r2 < 0.01) return { x: 0, y: 1 };                                                                                                                    
    let r = Math.sqrt(r2);                                                                                                                                   
    let r5 = r2 * r2 * r;          // r^5                                                                                                                    
    let mdotr = dy;                // (0,1)·(dx,dy)                                                                                                          
    let Bx = 3 * mdotr * dx / r5;                                                                                                                            
    let By = (3 * mdotr * dy - r2) / r5;                                                                                                                     
    let mag = Math.hypot(Bx, By);                                                                                                                            
    if (mag < 1e-8) return { x: 0, y: 1 };                                                                                                                   
    return { x: Bx / mag, y: By / mag };                                                                                                                     
  }                                                                                                                                                          
                                                                                                                                                             
  // ----- Magnet path (Lissajous figure) -----                                                                                                              
  function updateMagnet(progress) {                                                                                                                          
    let a = w * 0.4;                                                                                                                                         
    let b = h * 0.4;                                                                                                                                         
    magnetX = w / 2 + a * Math.cos(2 * Math.PI * (progress * 0.5));                                                                                          
    magnetY = h / 2 + b * Math.sin(2 * Math.PI * (progress * 0.8));                                                                                          
  }                                                                                                                                                          
                                                                                                                                                             
  // ----- Main animation loop -----                                                                                                                         
  function animate() {                                                                                                                                       
    let now = Date.now();                                                                                                                                    
    let elapsed = now - t0 + phase;                                                                                                                          
    let loopIndex = Math.floor(elapsed / loopMs);                                                                                                            
    let progress = (elapsed % loopMs) / loopMs;                                                                                                              
                                                                                                                                                             
    // Reset simulation when loop index changes                                                                                                              
    if (loopIndex !== currentLoopIndex) {                                                                                                                    
      currentLoopIndex = loopIndex;                                                                                                                          
      reseedSimulation();                                                                                                                                    
    }                                                                                                                                                        
                                                                                                                                                             
    // Time delta (seconds) capped                                                                                                                           
    let dt = Math.min((now - lastTime) / 1000, 0.1);                                                                                                         
    lastTime = now;                                                                                                                                          
    let dtScaled = dt * speed;  // physics time step, does not affect wall‑clock loop                                                                        
                                                                                                                                                             
    updateMagnet(progress);                                                                                                                                  
                                                                                                                                                             
    // Update filings                                                                                                                                        
    for (let p of particles) {                                                                                                                               
      let field = fieldAt(p.x, p.y);                                                                                                                         
      let targetAngle = Math.atan2(field.y, field.x);                                                                                                        
      let diff = ((targetAngle - p.angle + Math.PI) % (Math.PI * 2)) - Math.PI;                                                                              
      p.angle += diff * angularSpeed * dtScaled;                                                                                                             
                                                                                                                                                             
      // Gentle drift along field lines                                                                                                                      
      p.x += field.x * driftSpeed * dtScaled;                                                                                                                
      p.y += field.y * driftSpeed * dtScaled;                                                                                                                
                                                                                                                                                             
      // Wrap around edges                                                                                                                                   
      if (p.x < 0) p.x += w;                                                                                                                                 
      if (p.x > w) p.x -= w;                                                                                                                                 
      if (p.y < 0) p.y += h;                                                                                                                                 
      if (p.y > h) p.y -= h;                                                                                                                                 
    }                                                                                                                                                        
                                                                                                                                                             
    // Motion trail (persistence)                                                                                                                            
    ctx.globalCompositeOperation = 'source-over';                                                                                                            
    ctx.fillStyle = 'rgba(0,0,0,0.1)';                                                                                                                       
    ctx.fillRect(0, 0, w, h);                                                                                                                                
                                                                                                                                                             
    // Additive blending for neon glow                                                                                                                       
    ctx.globalCompositeOperation = 'lighter';                                                                                                                
    ctx.lineWidth = 1.5;                                                                                                                                     
    ctx.strokeStyle = 'rgba(200, 220, 255, 0.15)';                                                                                                           
    ctx.beginPath();                                                                                                                                         
    for (let p of particles) {                                                                                                                               
      let ex = p.x + Math.cos(p.angle) * segmentLength;                                                                                                      
      let ey = p.y + Math.sin(p.angle) * segmentLength;                                                                                                      
      ctx.moveTo(p.x, p.y);                                                                                                                                  
      ctx.lineTo(ex, ey);                                                                                                                                    
    }                                                                                                                                                        
    ctx.stroke();                                                                                                                                            
                                                                                                                                                             
    // Restore default blending (optional)                                                                                                                   
    ctx.globalCompositeOperation = 'source-over';                                                                                                            
                                                                                                                                                             
    requestAnimationFrame(animate);                                                                                                                          
  }                                                                                                                                                          
                                                                                                                                                             
  // Start the animation                                                                                                                                     
  reseedSimulation();                                                                                                                                        
  animate();                                                                                                                                                 
})();                                                                                                                                                        
</script>
